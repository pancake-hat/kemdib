<!DOCTYPE html>
<html lang="en">

<head>
    <title>KemdiBets</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles/styles.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
</head>

<body>

<div id="update-ticker">
    <span class="ticker_close">&times;</span>
    <div class="ticker-wrap">
        <div class="ticker">
            <!-- Ticker items are populated from scripts/constants.js via scripts/ticker.js -->
        </div>
    </div>
</div>

<nav>
    <div class="nav-container">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="cubes.html" class="nav-link">Cubes</a>
    </div>
</nav>

<h1>KemdiBets</h1>

<div class="game-layout">
    <div class="recent-wins-container">
        <h3>Recent Wins</h3>
        <div id="wins-list"></div>
    </div>

    <div class="slots-container">
        <div id="slot-display-global-counter">
            <div id="slot-display-global-counter-overlay"></div>
            <div id="slot-display-global-counter-overlay-line"></div>
            <div id="slot-global-clicks">global rolls</div>
            <div id="slot-zeros">000000000000</div>
        </div>

        <div id="slots">
            <div class="reel" id="holder1">
                <div id="bag1"></div>
            </div>

            <div class="reel" id="holder2">
                <div id="bag2"></div>
            </div>

            <div class="reel" id="holder3">
                <div id="bag3"></div>
            </div>
        </div>

        <div id="slot-display-local-counter">
            <div id="slot-display-local-counter-overlay"></div>
            <div id="slot-display-local-counter-overlay-line"></div>
            <div id="slot-curr-clicks">0</div>
            <div id="slot-zeros">00000000000</div>
        </div>
    </div>

    <div class="region-select-container" id="region-select">
        <!-- buttons populated from scripts/slot_machine.js -->
    </div>

    <div id="wrapp">
        <button id="click-button"><img id="wheel" src="images/kemdiu.png" alt="spinner"></button>
    </div>
</div>

<div id="pop-up-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2 id="modal-title">You Win!</h2>
        <a href="https://www.youtube.com/watch?v=jfZOvQnsBq0" target="_blank" rel="noopener noreferrer">
            <img id="modal-image" src="images/kemdiu.png">
            <br>
        </a>
        <p>Click the cube to collect your winnings!</p>
    </div>
</div>

<footer>
</footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script type="module" src="scripts/firebase_database.js"></script>
<script type="module" src="scripts/slot_machine.js" charset="utf-8"></script>
<script type="module" src="scripts/ticker.js" charset="utf-8"></script>
<script type="module" src="scripts/modal.js" charset="utf-8"></script>

</body>
</html>
